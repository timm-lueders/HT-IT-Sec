  #   taint_path: "IOCTL Input -> Irp->UserBuffer -> memcpy"
  #   recommendation: "ProbeForWrite immer vor UserBuffer-Zugriff aufrufen"

taint_graph:
  sources:
    # - name: "Irp->UserBuffer"
    #   type: "IOCTL METHOD_NEITHER"
  sinks:
    # - name: "memcpy (FveSafeMemcpy)"
    #   address: "0x14001a9c0"
  edges:
    # - from: "Irp->UserBuffer"
    #   to: "memcpy"
    #   bounded: true
    #   check_location: "0x14000434c"

tools_output:
  flawfinder:
    level_0_2_hits: 0
    level_3_hits: 0
    level_4_hits: 0
    level_5_hits: 0
    false_positives: 0
    notes: ""
  cwe_checker:
    total_findings: 0
    cwe787_oob_write: 0
    cwe125_oob_read: 0
    cwe476_null_deref: 0
    cwe676_dangerous_func: 0
    cwe190_int_overflow: 0
    cwe415_double_free: 0
    cwe416_use_after_free: 0
    cwe134_format_string: 0
    estimated_false_positive_rate: 97
    notes: ""
  gcc_analyzer:
    compiled: false
    warnings: 0
    tests_passed: 0
    tests_failed: 0
    notes: ""

artifacts:
  # - file: "fvevol_audited.sys"
  #   type: "patched_binary"
  #   description: "Gepatchte Binary mit Audit-Marker"
  #   md5: ""

summary:
