# ============================================================
# BINARY SECURITY AUDIT TEMPLATE v1.0
# Alle LLMs schreiben ihre Analyse-Ergebnisse in dieses Format.
# Eine YAML-Datei pro Binary. Wird von build_site.py zu HTML.
# ============================================================

meta:
  template_version: "1.0"
  binary_name: ""           # z.B. fvevol.sys
  binary_type: ""           # kernel_driver | user_exe | user_dll
  binary_path: ""           # Pfad zur Original-Datei
  sha256: ""                # SHA-256 Hash
  md5: ""                   # MD5 Hash
  file_size_bytes: 0
  analysis_date: ""         # ISO-Format: 2026-06-02
  analyst: ""               # Name oder LLM-Identifier
  analysis_duration_minutes: 0

binary_info:
  architecture: ""          # x86 | x64 | armv7 | aarch64
  base_address: ""          # z.B. 0x140000000
  entry_point: ""           # z.B. 0x140027b30
  function_count: 0
  symbol_count: 0
  compiler_hint: ""         # windows | gcc | msvc
  subsystem: ""             # native | windows_gui | windows_cui

pe_security:
  aslr: false               # DYNAMIC_BASE (0x40)
  dep: false                # NX_COMPAT (0x100)
  cfg: false                # GUARD_CF (0x4000)
  high_entropy_aslr: false  # HIGH_ENTROPY_ASLR (0x8000)
  safe_seh: false           # nur 32-bit relevant
  notes: ""

segments:
  - name: ".text"
    va_start: ""
    va_end: ""
    permissions: ""         # R/W/X
  - name: ".data"
    va_start: ""
    va_end: ""
    permissions: ""

import_risk_map:
  high: []
    # - api: "CreateProcessW"
    #   risk: "Command Injection bei ungeprüftem Input"
    #   cwe: "CWE-78"
  medium: []
    # - api: "IoBuildPartialMdl"
    #   risk: "Double-Fetch (TOCTOU)"
    #   cwe: "CWE-367"
  low: []
    # - api: "memcpy"
    #   risk: "Puffer-Sink, braucht Bounds-Check"
    #   cwe: "CWE-119"
  info: []
    # - api: "ZwReadFile"
    #   risk: "Disk-I/O"
    #   cwe: "N/A"

irp_handlers:  # Nur fur Kernel-Treiber relevant
  # - irp_code: "IRP_MJ_CREATE"
  #   address: "0x1400b88f0"
  #   function_name: "FvevolCreate"
  #   buffer_type: "SystemBuffer"
  #   probe_present: true
  #   risk: "OK"

findings:
  # - id: "FVE-001"
  #   severity: "MEDIUM"       # CRITICAL | HIGH | MEDIUM | LOW | INFO
  #   cwe: "CWE-119"
  #   title: "ProbeForWrite nur bedingt aufgerufen"
  #   function: "FvevolQueryVolumeInfo"
  #   address: "0x1400b9b68"
