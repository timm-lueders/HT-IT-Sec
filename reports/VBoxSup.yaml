findings:
- id: VBX-001
  severity: MEDIUM
  cwe: CWE-367
  title: IoBuildPartialMdl in IOCTL-Pfad
  function: SUPR0IoCtlPerform
  address: '0x140019700'
  description: 'VBoxSup.sys importiert IoBuildPartialMdl -- klassisches Double-Fetch-

    Risiko. Zwischen dem ProbeForWrite-Check und der tatsachlichen MDL-

    Verarbeitung kann ein paralleler Thread den User-Mode-Puffer andern.

    VirtualBox implementiert jedoch ProbeForRead+ProbeForWrite sowie

    ExGetPreviousMode was das Risiko reduziert.

    '
  taint_path: User IOCTL -> ProbeForWrite -> IoBuildPartialMdl -> Kernel Access
  recommendation: Auf MmProbeAndLockPages + MmMapLockedPagesSpecifyCache migrieren.
- id: VBX-002
  severity: LOW
  cwe: CWE-22
  title: Dateisystem-Zugriff aus Kernel-Treiber
  function: SUPR0LdrModByName + ZwCreateFile
  address: '0x1400032d0'
  description: 'VBoxSup.sys kann Dateien uber ZwCreateFile/ZwReadFile offnen (Modul-

    Loader). Ein bosartiger Pfad konnte zum Lesen beliebiger Kernel-

    Dateien fuhren. Pfad-Validierung ist kritisch.

    '
  taint_path: User IOCTL -> Pfad -> ZwCreateFile -> ZwReadFile
  recommendation: Pfad-Validierung gegen RTL_FILE_ROOT sicherstellen.
- id: VBX-003
  severity: INFO
  cwe: N/A
  title: Vorbildliche Sicherheitspraktiken identifiziert
  function: Global
  address: N/A
  description: 'VBoxSup.sys implementiert mehrere Sicherheitspraktiken die in

    Drittanbieter-Treibern selten sind:

    - ProbeForRead + ProbeForWrite vor User-Buffer-Zugriff

    - ExGetPreviousMode zur Unterscheidung User/Kernel-Caller

    - SeCaptureSubjectContext fur Access-Checks

    - RTR0MemUserCopyFrom/To fur sichere User-Mem-Kopien

    - ObReferenceObjectByHandle fur Handle-Validierung

    Dies deutet auf ein reifes Security-Development-Lifecycle hin.

    '
  recommendation: Best Practices beibehalten. IoBuildPartialMdl ersetzen.
- id: VBX-004
  severity: INFO
  cwe: N/A
  title: Netzwerk-Paket-Parsing im Kernel (RTNetIPv4*)
  function: RTNetIPv4* (14 Exports)
  address: 0x140031bd0+
  description: 'VBoxSup.sys enthalt Netzwerk-Paket-Parsing-Funktionen fur IPv4,

    TCP und UDP. Diese werden fur VirtualBox-Netzwerk-Bridging und

    NAT verwendet. Fehler im Paket-Parsing sind eine Remote-Kernel-

    Angriffsflache (CWE-120).

    '
  taint_path: Netzwerk-Paket -> RTNetIPv4IsHdrValid -> TCP/UDP-Validierung
  recommendation: Netzwerk-Paket-Parser auf Langenvalidierung prufen.
