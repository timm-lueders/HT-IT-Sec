- id: HTTP-001
  severity: HIGH
  cwe: CWE-367
  title: IoBuildPartialMdl in HTTP-Request-Parsing -- CVE-2015-1635-Klasse
  description: 'http.sys verarbeitet HTTP-Requests direkt im Kernel. 4.132 Funktionen.

    IoBuildPartialMdl + MmProbeAndLockPages fur Request-Puffer. IP-Address-

    Parsing via RtlIpv4StringToAddressExW. Security-Descriptor-Manipulation

    via SeCreateClientSecurity. Dies ist DIE Angriffsflache fur Remote-

    Kernel-Exploits in Windows (vgl. MS15-034/CVE-2015-1635).

    '
  taint_path: HTTP-Request -> IoBuildPartialMdl -> Kernel-Puffer
  recommendation: HTTP-Header-Parsing auf Range-Check validieren. Keine unchecked
    String-to-IP Konvertierung.
