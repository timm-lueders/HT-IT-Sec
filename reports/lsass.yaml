findings:
- id: LSA-001
  severity: HIGH
  cwe: CWE-20
  title: RPC-Server -- Remote-Angriffsflache via NdrServerCallAll
  description: 'lsass.exe ist ein RPC-Server (NdrServerCallAll/NdrServerCall2) mit

    RpcServerUseProtseqEpW zur Endpoint-Registrierung. SSPI-Credential-

    Handling (SspirAcquireCredentialsHandle, SspirProcessSecurityContext)

    verarbeitet Authentifizierungs-Tokens. Ein Bug im RPC-Marshalling

    oder Token-Parsing kann zur SYSTEM-Kompromittierung fuhren.

    '
  taint_path: RPC-Client -> NdrServerCall -> SSPI -> Token -> SYSTEM
  recommendation: RPC-Schnittstelle auf Input-Validierung prufen. SSPI-Token-Parsing
    auf Buffer-Overflow testen.
