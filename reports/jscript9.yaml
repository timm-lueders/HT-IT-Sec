findings:
  - id: "JS9-001"
    severity: "HIGH"
    cwe: "CWE-122"
    title: "JIT-Compiler erzeugt W+X-Speicher"
    function: "JIT Compiler (via VirtualProtect)"
    address: "N/A (dynamisch)"
    description: |
      Der Chakra-JIT-Compiler nutzt VirtualProtect um allozierte Speicherseiten
      auf PAGE_EXECUTE_READWRITE zu setzen. Dies ist die klassische JIT-Angriffsflache:
      Ein Bug in der Code-Generierung erlaubt das Einschleusen von Shellcode.
      FlushInstructionCache wird danach aufgerufen um den I-Cache zu leeren.
    taint_path: "JS-Input -> Parser -> Bytecode -> JIT -> VirtualProtect(W+X)"
    recommendation: "JIT-Spraying-Mitigationen prufen: Constant-Blinding, NOP-Sled-Detection."
  - id: "JS9-002"
    severity: "MEDIUM"
    cwe: "CWE-119"
    title: "Unsichere memcpy/memmove parallel zu _s-Varianten"
    function: "Verschiedene"
    address: "N/A"
    description: |
      jscript9.dll importiert sowohl memcpy/memmove (unsicher) als auch
      memcpy_s/memmove_s (sicher). Die Existenz BEIDER Varianten deutet auf
      inkonsistente Sicherheitspraxis hin. Einige Codepfade nutzen die
      unsicheren Varianten ohne Langenprufung.
    taint_path: "JS-Input -> Parser -> AST -> memcpy (unsafe)"
    recommendation: "Alle memcpy/memmove-Aufrufe auf _s-Varianten migrieren."
  - id: "JS9-003"
    severity: "MEDIUM"
    cwe: "CWE-416"
    title: "Garbage Collector -- Use-After-Free-Risiko"
    function: "GC (WriteWatch-basiert)"
    address: "N/A"
    description: |
      Der Chakra-GC nutzt GetWriteWatch/ResetWriteWatch fur die Write-Barrier.
      Fehler in der GC-Implementierung konnen zu Use-After-Free fuhren --
      insbesondere bei getypten Arrays (TypedArray-Klassen) die direkten
      Speicherzugriff erlauben.
    taint_path: "JS-Input -> ArrayBuffer -> GC -> Use-After-Free"
    recommendation: "GC-Implementierung auf UAF-Muster prufen."

