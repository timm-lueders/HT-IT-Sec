findings:
- id: NDS-001
  severity: HIGH
  cwe: CWE-119
  title: Netzwerk-Paket-Parsing -- Remote-Kernel-Overflow
  function: NdisGetDataBuffer + Paket-Parser
  address: N/A
  description: 'ndis.sys ist der zentrale Netzwerk-Treiber von Windows. Er verarbeitet

    Netzwerk-Pakete direkt im Kernel. 3.697 Funktionen deuten auf massive

    Code-Komplexitat hin. Ein Bug im Paket-Parsing (z.B. falsche

    Ethernet/IP/TCP-Header-Lange) kann Remote-Kernel-Code-Execution

    ermoglichen. Der Treiber nutzt MmUserProbeAddress + ExGetPreviousMode

    fur User-Mode-Validierung und MmIsDriverVerifying fur Test-Support.

    '
  taint_path: Netzwerk-Paket -> NDIS-Miniport -> Paket-Buffer -> MDL-Mapping -> Verarbeitung
  recommendation: Netzwerk-Fuzzing mit Scapy/Boofuzz. Header-Langen-Validierung sicherstellen.
- id: NDS-002
  severity: MEDIUM
  cwe: CWE-134
  title: _vsnwprintf ohne _s-Suffix
  description: ndis.sys importiert die unsichere Format-String-Variante ohne Langenbegrenzung.
  recommendation: Auf _vsnwprintf_s migrieren.
- id: NDS-003
  severity: INFO
  cwe: N/A
  title: Driver-Verifier-Integration + moderne APIs
  description: Nutzung von MmIsDriverVerifying, MmBadPointer, ExAllocatePool3, KeQueryDpcWatchdogInformation.
    Dies sind Indikatoren fur einen modernen, gut getesteten Treiber.
  recommendation: Best Practices beibehalten.
