findings:
- id: CMD-001
  severity: INFO
  cwe: CWE-119
  title: memcpy an 14 Stellen verwendet -- alle via Bounds-Checks geschützt
  function: Verschiedene (siehe cwe_checker CWE676)
  address: 0x140007787, 0x14000c2ae, 0x140010566, u.a.
  description: 'cwe_checker identifizierte 14 memcpy-Aufrufstellen (CWE676).

    Alle analysierten Pfade haben Bounds-Checking:

    - Command-Line-Copy: 0x2000-Zeichen-Limit, 0x4000-Byte-Buffer

    - HeapEnableTerminationOnCorruption aktiv (Heap-Hardening)

    - Safe-Format-String-Varianten (_s) werden verwendet

    '
  taint_path: GetCommandLineW() -> wchar_t[0x4000] -> memcpy-artiger Copy-Loop
  recommendation: Keine akute Gefahr. Bounds-Checks sind vorhanden.
- id: CMD-002
  severity: INFO
  cwe: N/A
  title: HeapEnableTerminationOnCorruption aktiviert
  function: main
  address: '0x140033a6c'
  description: "In der main()-Funktion wird HeapSetInformation(0, \nHeapEnableTerminationOnCorruption,\
    \ 0, 0) aufgerufen. Dies\naktiviert das Heap-Hardening: bei Heap-Korruption wird\
    \ der\nProzess sofort terminiert statt undefiniert weiterzulaufen.\nVerhindert\
    \ Heap-basierte Exploits.\n"
  taint_path: N/A
  recommendation: Vorbildliche Sicherheitspraxis.
- id: CMD-003
  severity: INFO
  cwe: N/A
  title: Safe Format-String-Funktionen verwendet
  function: Global
  address: N/A
  description: 'cmd.exe importiert _o___stdio_common_vswprintf_s (safe Variante

    mit Längenbegrenzung) sowie _ultoa_s, wcstoul, wcstol für

    String-zu-Zahl-Konvertierung. Keine unsicheren Varianten wie

    sprintf, swprintf ohne _s, gets oder scanf gefunden.

    '
  taint_path: N/A
  recommendation: Vorbildliche API-Auswahl.
- id: CMD-004
  severity: INFO
  cwe: N/A
  title: GCC -fanalyzer fand NULL-Deref im Testcode (vor Ausführung gefixt)
  function: CmdCopyCommandLine (Testbench)
  address: N/A
  description: 'Beim Kompilieren der extrahierten Logik mit GCC -fanalyzer

    wurde eine potentielle NULL-Dereferenz im Testcode gefunden:

    Der Test für leere Eingabe (L"") rief CmdCopyCommandLine mit

    einem leeren String auf, der die 0x2000-Bounds-Prüfung nicht

    bestand und NULL zurückgab. Der nachfolgende buf[0]-Zugriff

    wäre ein NULL-Deref gewesen. Wurde vor Compile gefixt.

    '
  taint_path: 'Testbench: L"" -> CmdCopyCommandLine -> NULL -> buf[0]'
  recommendation: Im echten cmd.exe tritt dieser Fall nicht auf, da GetCommandLineW()
    nie einen leeren String zurückgibt.
