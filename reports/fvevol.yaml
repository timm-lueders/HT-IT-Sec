findings:
  - id: "FVE-001"
    severity: "MEDIUM"
    cwe: "CWE-119"
    title: "ProbeForWrite nur bedingt aufgerufen in FvevolQueryVolumeInfo"
    function: "FvevolQueryVolumeInfo"
    address: "0x1400b9b68"
    description: |
      Bei Flag=0 (do_not_probe=true) wird Irp->UserBuffer OHNE vorheriges
      ProbeForWrite beschrieben, obwohl Daten in den User-Buffer kopiert werden.
      Der Code-Pfad: Irp->UserBuffer (0x70) wird gelesen, OutputBufferLength
      aus dem IO_STACK_LOCATION (0xb8+0x08) wird als Größe verwendet.
      ProbeForWrite(UserBuffer, OutputBufferLength, 2) wird NUR aufgerufen
      wenn das Flag != 0 ist. Danach kopiert FveCopyDataToUserBuffer die Daten.
      
      Der interne Bounds-Check in FveCopyDataToUserBuffer (0x14000434c)
      pruft: (int)(uint)actual_size <= (int)((uint)max_size - (uint)offset)
      und verhindert so einen Overflow. Ein invalider Pointer fuhrt zum
      sofortigen Bluescreen (DoS), nicht zur Code Execution.
      
      Betroffene Adressen: 0x1400b9b68 (Funktion), 0x1400b9d06 (ProbeForWrite-Call)
    taint_path: "IOCTL Input -> Irp->UserBuffer -> FveSafeMemcpy"
    recommendation: |
      ProbeForWrite unabhangig vom Flag immer vor UserBuffer-Zugriff
      aufrufen. Alternativ: Parameter als METHOD_BUFFERED deklarieren,
      dann validiert der I/O-Manager den Puffer automatisch.
  - id: "FVE-002"
    severity: "LOW"
    cwe: "CWE-200"
    title: "8-Byte Information Disclosure bei zu kleinem Ausgabepuffer"
    function: "FvevolQueryVolumeInfo"
    address: "0x1400b9b68"
    description: |
      Wenn der OutputBuffer zu klein ist (GroBe < 8 oder tatsachliche
      DatengroBe > OutputBufferLength), werden TROTZDEM 8 Bytes in den
      UserBuffer kopiert, bevor STATUS_BUFFER_TOO_SMALL zurückgegeben wird.
      
      Code: *puVar2 = *(undefined8 *)puVar4;  // Kopiert 8 Bytes
      Danach: return STATUS_BUFFER_TOO_SMALL;
      
      Die 8 Bytes enthalten den Größen-Header der FVE-Datenstruktur --
      keine sensitiven Daten wie kryptografische Schlussel. Dieses
      Muster ist in Windows-Treibern ublich (Caller erfahrt benotigte Größe),
      stellt aber technisch eine Informationspreisgabe dar.
    taint_path: "Internal Buffer -> Irp->UserBuffer (8 bytes, always)"
    recommendation: |
      Nur die benotigte Größe im IoStatus.Information-Feld zurückgeben,
      KEINE Daten in den UserBuffer kopieren wenn der Puffer zu klein ist.
  - id: "FVE-003"
    severity: "INFO"
    cwe: "N/A"
    title: "Sichere IOCTL-Eingabevalidierung"
    function: "FvevolIoHandler"
    address: "0x1400ba64c"
    description: |
      Der IOCTL-Dispatcher validiert Eingaben zweistufig:
      1. InputBufferLength zwischen 8 und 0x200 Bytes
      2. InputBufferLength == erstes uint32 im Input-Buffer (Double-Validation)
      
      Dieses Pattern verhindert: Structure-Size-Mismatch-Angriffe,
      Buffer-überlaufe durch falsche Größenangaben, NULL-Dereferenzen
      durch zu kleine Puffer.
    taint_path: "IOCTL Input -> InputBufferLength -> Bounds-Check"
    recommendation: "Vorbildliche Implementierung -- keine Änderung notig."
  - id: "FVE-004"
    severity: "INFO"
    cwe: "N/A"
    title: "Dreifacher Bounds-Check im MDL-I/O-Pfad"
    function: "FvevolIoWorkItemCallback"
    address: "0x14005c3a0"
    description: |
      Vor jedem memcpy im Read/Write-Pfad werden drei Checks durchgefuhrt:
      1. BufferSize < CopySize -> Fehler
      2. Offset > CopySize -> Fehler  
      3. BufferSize + Offset < TotalNeeded -> Fehler
      
      Alle drei Checks haben Integer-überlauf-Guards. Erst danach wird
      MmMapLockedPagesSpecifyCache aufgerufen und memcpy ausgefuhrt.
    taint_path: "Irp->MdlAddress -> MmMapLockedPages -> memcpy"
    recommendation: "Vorbildliche Implementierung -- keine Änderung notig."
  - id: "FVE-005"
    severity: "INFO"
    cwe: "N/A"
    title: "Registry-Zugriff mit Double-Query-Pattern"
    function: "FvevolReadRegistryValue"
    address: "0x1400cacb4"
    description: |
      Registry-Werte werden mit dem sicheren Double-Query-Pattern gelesen:
      1. ZwQueryValueKey(NULL) -> RequiredSize ermitteln
      2. ExAllocatePool2(RequiredSize) -> Puffer allozieren
      3. ZwQueryValueKey(buffer, RequiredSize) -> Daten lesen
      4. Vor Kopie in Ausgabepuffer: Größenvergleich
      
      TOCTOU-sicher durch atomare Allokation zwischen Query-Aufrufen.
    taint_path: "Registry Key -> ZwQueryValueKey -> ExAllocatePool2 -> memcpy"
    recommendation: "Vorbildliche Implementierung -- keine Änderung notig."
  - id: "FVE-006"
    severity: "INFO"
    cwe: "N/A"
    title: "Keine gefahrlichen String-Funktionen verwendet"
    function: "Global"
    address: "N/A"
    description: |
      Die Import-Liste enthalt KEINE unsicheren String-Funktionen:
      - Kein strcpy, strcat, sprintf, gets
      - Kein wcscpy, wcscat (nur wcsstr, wcschr für Suche)
      - Kein scanf/sscanf
      - Stattdessen: _snwprintf, _vsnwprintf (safe mit Langenbegrenzung)
      
      Dies eliminiert die gesamte Klasse der klassischen Buffer-Overflows
      durch String-Operationen.
    taint_path: "N/A"
    recommendation: "Vorbildliche API-Auswahl."

